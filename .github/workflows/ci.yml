name: CI

on:
  push:
  pull_request:

jobs:
  test-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync SvelteKit
        run: bunx svelte-kit sync

      - name: Run tests
        run: bun test

      - name: Run type checks
        run: bun run check
